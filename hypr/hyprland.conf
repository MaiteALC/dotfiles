#####################
### LOOK AND FEEL ###
#####################


general {
    gaps_in = 6
    gaps_out = 8

    border_size = 2

    col.active_border = rgb(f38ba8) rgb(bd93f9) 45deg
    col.inactive_border = rgb(44475a)

    resize_on_border = true

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 12
    rounding_power = 3

    screen_shader =

    dim_inactive = true
    dim_strength = 0.04

    shadow {
        enabled = true
        range = 35
        render_power = 4
        color = rgba(00000050)
        offset = 0 8
    }

    active_opacity = 1.0
    inactive_opacity = 0.95
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 5
        passes = 2
        new_optimizations = true
        ignore_opacity = true
        xray = true
        noise = 0.04
        contrast = 0.9
        brightness = 0.85
        vibrancy = 0.3
        popups = true
        special = true
    }
}

animations {
    enabled = true

    bezier = bounce, 0.0, 1.25, 0.15, 1.0
    bezier = buttery, 0.1, 1.15, 0.15, 1.02
    bezier = smooth, 0.0, 0.0, 0.12, 1.0
    bezier = linear, 0.0, 0.0, 1.0, 1.0

    animation = windowsIn, 1, 4.5, bounce, slide
    animation = windowsOut, 1, 3.5, smooth, slide
    animation = windowsMove, 1, 4, buttery, slide

    animation = fadeIn, 1, 3.5, smooth
    animation = fadeOut, 1, 3, smooth
    animation = fadeDim, 1, 4, smooth
    animation = fadeShadow, 1, 4, smooth

    animation = workspaces, 1, 4.5, buttery, slidefade 10%    
    animation = specialWorkspace, 1, 4.5, buttery, slidefadevert -15%

    animation = border, 1, 7, smooth
    animation = borderangle, 1, 35, linear, loop

    animation = layersIn, 1, 4, bounce, slide
    animation = layersOut, 1, 3, smooth, slide
}


dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}


master {
    new_status = master
}


misc {
    force_default_wallpaper = 0

    disable_hyprland_logo = true

    animate_manual_resizes = true
    animate_mouse_windowdragging = true

    vrr = 1
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}



#############
### INPUT ###
#############


cursor {
    inactive_timeout = 10
}

device { # laptop keyboard
    name = at-translated-set-2-keyboard
    kb_layout = br
}


device { # external keyboard
    name = -------x68he
    kb_layout = us
    # kb_variant = intl
}


device { # mouse
    name = beken-usb-gaming-mouse-1
    sensitivity = -0.34
}

input {
    follow_mouse = 1

    sensitivity = 0

    touchpad {
        natural_scroll = true
        tap-to-click = true
    }
}



##############################
### WINDOWS AND WORKSPACES ###
##############################


windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

windowrule = match:title idea, no_blur on
windowrule = match:title idea, opacity 1.0

layerrule = blur off, match:namespace waybar
layerrule = blur off, match:namespace swaync-control-center
layerrule = blur on, match:namespace wofi
