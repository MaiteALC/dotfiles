################
### MONITORS ###
################

monitor=eDP-1,1920x1080@165,0x0,1


###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = nautilus
$menu = wofi --show drun
$browser = firefox


#################
### AUTOSTART ###
#################

exec-once = hypridle
exec-once = nm-applet
exec-once = blueman-applet
exec-once = waybar
exec-once = hyprpaper
exec-once = swaync
exec-once = pasystray
exec-once = wl-paste --type text --watch cliphist store 
exec-once = wl-paste --type image --watch cliphist store
exec-once = hyprctl setcursor Bibata-Modern-Ice 20


#############################
### ENVIRONMENT VARIABLES ###
#############################

source = ~/dotfiles/hypr/env_hardware.conf

env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,20
env = HYPRCURSOR_SIZE,20

env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORMTHEME,qt6ct

env = QT_QPA_PLATFORM,wayland;xcb
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland

env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = GTK_THEME,catppuccin-mocha-red-standard+default


###################
### KEYBINDINGS ###
###################

source = ~/dotfiles/hypr/keybinds.conf


###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 6
    gaps_out = 9

    border_size = 2

    col.active_border = rgb(f38ba8) rgb(bd93f9) 45deg
    col.inactive_border = rgb(44475a)

    resize_on_border = true

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 12
    rounding_power = 3

    screen_shader =

    dim_inactive = true
    dim_strength = 0.03

    active_opacity = 1.0
    inactive_opacity = 0.95
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 4
        passes = 2
        new_optimizations = true
        ignore_opacity = true
        xray = true
        noise = 0.04
        contrast = 0.9
        brightness = 0.85
        vibrancy = 0.3
        popups = true
        special = true
    }
}

animations {
    enabled = true

    bezier = bounce, 0.0, 1.25, 0.15, 1.0
    bezier = buttery, 0.1, 1.15, 0.15, 1.02
    bezier = smooth, 0.0, 0.0, 0.12, 1.0
    bezier = linear, 0.0, 0.0, 1.0, 1.0

    animation = windowsIn, 1, 4.5, bounce, slide
    animation = windowsOut, 1, 3.5, smooth, slide
    animation = windowsMove, 1, 4, buttery, slide

    animation = fadeIn, 1, 3.5, smooth
    animation = fadeOut, 1, 3, smooth
    animation = fadeDim, 1, 4, smooth
    animation = fadeShadow, 1, 4, smooth

    animation = workspaces, 1, 4.5, buttery, slidefade 10%    
    animation = specialWorkspace, 1, 4.5, buttery, slidefadevert -15%

    animation = border, 1, 7, smooth
    animation = borderangle, 1, 35, linear, loop

    animation = layersIn, 1, 4, bounce, slide
    animation = layersOut, 1, 3, smooth, slide
}


dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds file
    preserve_split = false
    smart_split = true
}


master {
    new_status = master
}


misc {
    force_default_wallpaper = 0

    disable_hyprland_logo = true

    animate_manual_resizes = true
    animate_mouse_windowdragging = true

    vrr = 1
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}


#############
### INPUT ###
#############

source = ~/.config/hypr/devices.conf

input {
    follow_mouse = 1

    sensitivity = 0

    touchpad {
        natural_scroll = true
        tap-to-click = true
    }
}


##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

windowrule = match:title idea, no_blur on
windowrule = match:title idea, opacity 1.0
windowrule = no_blur on, match:class xwayland:1, match:float true

layerrule = blur off, match:namespace waybar
layerrule = blur off, match:namespace swaync-control-center
layerrule = blur on, match:namespace wofi
