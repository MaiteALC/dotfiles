general {
    no_fade_in = false
    grace = 0
    disable_loading = false
}

background {
    monitor =
    path = ~/dotfiles/wallpapers/angel-makima.jpg
    color = rgba(25, 20, 20, 1.0)
    blur_passes = 0
}

input-field {
    size = 110, 35
    outline_thickness = 0
    dots_size = 0.2
    dots_space = 0.5
    dots_center = true
    inner_color = rgb(FFFFFF)
    font_color = rgb(10, 10, 10)
    hide_input = false
    rounding = -1
    check_color = rgb(255, 97, 97)
    fail_color = rgb(255, 97, 97)
    fail_transition = 300
    position = 0, -20
    halign = center
    valign = center
}

label {
    text = $TIME
    color = rgb(FFFFFF)
    font_size = 100
    font_family = JetBrainsMono Nerd Font
    position = 0, 175
    halign = center
    valign = center
    shadow_passes = 5
    shadow_size = 10
}
